repos:
  - repo: local
    hooks:
      - id: ledger-add
        name: Ledger add
        entry: ledger-add.sh
        language: script
        pass_filenames: false
        always_run: true
      - id: ledger-finalize
        name: Ledger finalize
        entry: ledger-finalize.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [post-commit]
      - id: ledger-rewrite
        name: Ledger rewrite
        entry: ledger-rewrite.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [post-rewrite]
