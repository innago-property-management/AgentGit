name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill in as much detail as you can.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Configure appsettings.json with...
        2. Run `scripts/agent-git.sh /path/to/repo -m "test"`
        3. See error...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: dotnet
    attributes:
      label: .NET version
      placeholder: "dotnet --version output"
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
